name: Sovereign Truth Convergence

on:
  push:
    branches: [main]
  pull_request:

jobs:
  integrity_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Verify valid identity present
        run: test -f valid_identity.txt

      - name: Verify invalid identity absent
        run: "! test -f invalid_identity.txt"

      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pytest

      - name: Run organic mechanics tests
        run: pytest tas_pythonetics/tests/ -q
